<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FL!P 牌卡互動系統 v2 - 待選功能</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --accent-color: #333;
            --shadow-color: rgba(0, 0, 0, 0.1);
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Microsoft JhengHei";
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* 待選區樣式 */
        .selection-area {
            width: 100%;
            max-width: 1200px;
            background: #fff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px var(--shadow-color);
            margin-bottom: 30px;
            min-height: 120px;
            border: 2px dashed #b2dfdb;
        }
        .selection-area h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: #00796b;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .selection-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: flex-start;
        }

        /* 分頁切換按鈕 */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            background: #fff;
            padding: 8px;
            border-radius: 50px;
            box-shadow: 0 2px 8px var(--shadow-color);
        }
        .tab-btn {
            padding: 10px 25px;
            border: none;
            background: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 40px;
            transition: all 0.3s ease;
            color: #666;
        }
        .tab-btn.active {
            background: #00796b;
            color: #fff;
        }

        /* 卡片容器 */
        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        /* 卡片結構 */
        .flip-card {
            background-color: transparent;
            width: 160px;
            height: 230px;
            perspective: 1000px;
            position: relative;
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
            border-radius: 12px;
            box-shadow: 0 4px 10px var(--shadow-color);
        }
        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 15px;
            box-sizing: border-box;
            border-radius: 12px;
            border: 4px solid;
            background: #fff;
        }
        .card-back {
            transform: rotateY(180deg);
        }

        /* 按鈕樣式 (加號與叉號) */
        .action-btn {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        .action-btn:hover { transform: scale(1.15); }
        .add-btn { background-color: #43a047; }
        .remove-btn { background-color: #e53935; }

        /* 卡片文字細節 */
        .card-id { font-size: 10px; opacity: 0.5; margin-bottom: 8px; font-weight: bold; }
        .card-title { font-size: 17px; font-weight: 900; line-height: 1.3; margin-bottom: 8px; }
        .card-en { font-size: 11px; color: #888; font-style: italic; line-height: 1.2; }

        @media (max-width: 600px) {
            .flip-card { width: 145px; height: 210px; }
            .card-title { font-size: 15px; }
        }
    </style>
</head>
<body>

    <div class="selection-area">
        <h2>
            我的精選待選區 (已選: <span id="select-count">0</span>)
            <button onclick="clearSelection()" style="font-size: 12px; cursor: pointer; padding: 5px 12px; border-radius: 5px; border: 1px solid #ccc; background: #fff;">全部清空</button>
        </h2>
        <div id="selection-grid" class="selection-grid">
            </div>
    </div>

    <div class="tabs">
        <button id="btn-back" class="tab-btn active" onclick="switchTab('back')">背面觀 (陰影面起手)</button>
        <button id="btn-front" class="tab-btn" onclick="switchTab('front')">正面觀 (優勢面起手)</button>
    </div>

    <div id="main-pool" class="card-container">
        </div>

            {"f_id": 26, "f_text": "做好充分準備", "f_en": "I'm well prepared", "b_id": 52, "b_text": "過於執著既定計畫", "b_en": "I'm obsessed with planning", "color": "#64b5f6"},
            {"f_id": 27, "f_text": "不易受情感影響", "f_en": "I'm not very emotional", "b_id": 59, "b_text": "難以覺察別人感受", "b_en": "I'm insensitive to other people's feelings", "color": "#64b5f6"},
            {"f_id": 28, "f_text": "理性行事", "f_en": "I act rationally", "b_id": 60, "b_text": "待人冷漠", "b_en": "I'm cold to others", "color": "#64b5f6"},
            {"f_id": 29, "f_text": "沉著冷靜", "f_en": "I'm calm", "b_id": 58, "b_text": "欠缺幽默感", "b_en": "I do not have a sense of humor", "color": "#64b5f6"},
            {"f_id": 30, "f_text": "行動前會認真分析", "f_en": "I think deeply first and then act", "b_id": 54, "b_text": "花很多時間做決定", "b_en": "I take too much time to make decisions", "color": "#64b5f6"},
            {"f_id": 31, "f_text": "勇於嘗試新事物", "f_en": "I'm good at trying new things", "b_id": 97, "b_text": "容易失去興趣", "b_en": "I easily lose interest", "color": "#9575cd"},
            {"f_id": 32, "f_text": "享受自我挑戰", "f_en": "I enjoy challenging myself", "b_id": 100, "b_text": "行動前缺乏深思", "b_en": "I act without thinking", "color": "#9575cd"},
            {"f_id": 33, "f_text": "專注做好自己喜愛的事", "f_en": "I'm easily absorbed in what I like", "b_id": 95, "b_text": "只著眼於自己喜愛的事", "b_en": "I'm interested in only what I like", "color": "#9575cd"},

            {"f_id": 37, "f_text": "應對快速", "f_en": "I react quickly", "b_id": 99, "b_text": "做事前不考量", "b_en": "I do not ponder", "color": "#9575cd"},
            {"f_id": 38, "f_text": "善於表達情感", "f_en": "I express my feelings well", "b_id": 93, "b_text": "難以控制情緒", "b_en": "I have difficulty controlling my emotion", "color": "#9575cd"},
            {"f_id": 39, "f_text": "善於創意思考", "f_en": "I'm good at creative thinking", "b_id": 96, "b_text": "常做白日夢", "b_en": "I often daydream", "color": "#9575cd"},
            {"f_id": 40, "f_text": "享受改變", "f_en": "I enjoy changes", "b_id": 92, "b_text": "缺乏一致性", "b_en": "I lack consistency", "color": "#9575cd"},

            {"f_id": 42, "f_text": "努力維持良好關係", "f_en": "I try to keep good relations with others", "b_id": 77, "b_text": "逃避衝突", "b_en": "I avoid conflict", "color": "#81c784"},
            {"f_id": 43, "f_text": "聆聽及考量他人意見", "f_en": "I consider other people's opinions", "b_id": 80, "b_text": "依賴他人", "b_en": "I'm dependent on others", "color": "#81c784"},
            {"f_id": 44, "f_text": "謙虛不自誇", "f_en": "I'm humble", "b_id": 71, "b_text": "缺乏自信", "b_en": "I lack confidence", "color": "#81c784"},
            {"f_id": 45, "f_text": "小心行事", "f_en": "I act carefully", "b_id": 78, "b_text": "猜疑心重", "b_en": "I'm suspicious", "color": "#81c784"},
            {"f_id": 46, "f_text": "不會犯嚴重過錯", "f_en": "I do not make big mistakes", "b_id": 75, "b_text": "糾結於犯錯的可能", "b_en": "I obsess over what could go wrong", "color": "#81c784"},
            {"f_id": 47, "f_text": "體貼有禮", "f_en": "I'm polite", "b_id": 79, "b_text": "太在意別人的想法", "b_en": "I care too much about what other people think", "color": "#81c784"},
            {"f_id": 48, "f_text": "善於忍耐", "f_en": "I'm patient", "b_id": 72, "b_text": "壓抑自我需要", "b_en": "I suppress what I want to do", "color": "#81c784"},
            {"f_id": 49, "f_text": "待人溫柔", "f_en": "I'm mild", "b_id": 74, "b_text": "害羞", "b_en": "I'm shy", "color": "#81c784"},
            {"f_id": 50, "f_text": "避免衝突與傷害別人", "f_en": "I do not harm others", "b_id": 76, "b_text": "擔心引人注目", "b_en": "I try not to stand out", "color": "#81c784"}
        ];

        let selectedIds = new Set();
        let currentMode = 'back'; // 'back' (背面起手) 或 'front' (正面起手)

        // 初始化渲染主牌庫
        function renderPool() {
            const pool = document.getElementById('main-pool');
            pool.innerHTML = '';
            
            // 根據模式排序
            const sortedData = [...cardData].sort((a, b) => {
                return currentMode === 'back' ? a.b_id - b.b_id : a.f_id - b.f_id;
            });

            sortedData.forEach(item => {
                const cardWrapper = document.createElement('div');
                cardWrapper.className = 'flip-card';
                cardWrapper.id = `pool-card-${item.f_id}`;
                
                const addBtn = document.createElement('button');
                addBtn.className = 'action-btn add-btn';
                addBtn.innerHTML = '+';
                addBtn.title = "加入精選";
                addBtn.onclick = (e) => {
                    e.stopPropagation();
                    addToSelection(item.f_id);
                };
                
                cardWrapper.appendChild(addBtn);
                cardWrapper.appendChild(createCardInner(item));
                pool.appendChild(cardWrapper);
            });
        }

        // 創建卡片內層 HTML (含正反面內容)
        function createCardInner(item) {
            const inner = document.createElement('div');
            inner.className = 'flip-card-inner';
            inner.onclick = () => {
                inner.parentElement.classList.toggle('flipped');
            };

            const front = document.createElement('div');
            front.className = 'card-front';
            
            const back = document.createElement('div');
            back.className = 'card-back';

            if (currentMode === 'back') {
                // 背面(陰影)起手
                front.style.borderColor = '#999';
                front.innerHTML = `
                    <div class="card-id">#${item.b_id}</div>
                    <div class="card-title">${item.b_text}</div>
                    <div class="card-en">${item.b_en}</div>
                `;
                back.style.borderColor = item.color;
                back.innerHTML = `
                    <div class="card-id">#${item.f_id}</div>
                    <div class="card-title" style="color:${item.color}">${item.f_text}</div>
                    <div class="card-en">${item.f_en}</div>
                `;
            } else {
                // 正面(優勢)起手
                front.style.borderColor = item.color;
                front.innerHTML = `
                    <div class="card-id">#${item.f_id}</div>
                    <div class="card-title" style="color:${item.color}">${item.f_text}</div>
                    <div class="card-en">${item.f_en}</div>
                `;
                back.style.borderColor = '#999';
                back.innerHTML = `
                    <div class="card-id">#${item.b_id}</div>
                    <div class="card-title">${item.b_text}</div>
                    <div class="card-en">${item.b_en}</div>
                `;
            }

            inner.appendChild(front);
            inner.appendChild(back);
            return inner;
        }

        // 加入待選區邏輯
        function addToSelection(fId) {
            if (selectedIds.has(fId)) return;
            selectedIds.add(fId);
            renderSelection();
        }

        // 從待選區移除邏輯
        function removeFromSelection(fId) {
            selectedIds.delete(fId);
            renderSelection();
        }

        // 清空待選區
        function clearSelection() {
            if (confirm("確定要清空所有精選卡片嗎？")) {
                selectedIds.clear();
                renderSelection();
            }
        }

        // 渲染待選區
        function renderSelection() {
            const grid = document.getElementById('selection-grid');
            const countLabel = document.getElementById('select-count');
            grid.innerHTML = '';
            countLabel.innerText = selectedIds.size;

            selectedIds.forEach(fId => {
                const item = cardData.find(d => d.f_id === fId);
                const cardWrapper = document.createElement('div');
                cardWrapper.className = 'flip-card';
                
                const removeBtn = document.createElement('button');
                removeBtn.className = 'action-btn remove-btn';
                removeBtn.innerHTML = '×';
                removeBtn.onclick = (e) => {
                    e.stopPropagation();
                    removeFromSelection(fId);
                };
                
                cardWrapper.appendChild(removeBtn);
                cardWrapper.appendChild(createCardInner(item));
                grid.appendChild(cardWrapper);
            });
        }

        // 切換分頁觀點
        function switchTab(mode) {
            currentMode = mode;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${mode}`).classList.add('active');
            
            renderPool();
            renderSelection(); 
        }

        // 啟動系統
        renderPool();
    </script>
</body>
</html>
